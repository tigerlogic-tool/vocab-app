<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>単語暗記ツール（Anki方式）</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body { font-family: sans-serif; text-align: center; margin: 20px; }
button { margin: 6px; padding: 12px; font-size: 16px; width: 80%; max-width: 320px; }
#result { font-size: 18px; margin-top: 10px; height: 24px; }
input { padding: 8px; margin: 5px; width: 100px; }
</style>
</head>
<body>

<h2>出題範囲</h2>
<input type="number" id="startId" value="1"> ～ 
<input type="number" id="endId" value="50">
<br>
<button onclick="applyRange()">範囲を適用</button>

<h1 id="word">読み込み中...</h1>

<div id="choices"></div>
<p id="result"></p>

<br>
<button onclick="finishTest()">テスト終了（ログ保存）</button>

<script>
let words = [];
let filteredWords = [];
let current = null;

// Anki管理
let reviewQueue = [];
let correctMap = {};
let intervalMap = {}; // ★ 間隔管理

let recentWords = [];

let correctCount = 0;
let totalCount = 0;

const GAS_URL = "https://script.google.com/macros/s/AKfycbyN6uzDSwGi71-yeY38Mm3HzwA7Y2DsnbDkcE27tiWskXZaO5P1vR7QbpkeqsWgzIuquQ/exec";

let sessionId = getJSTString();

function getJSTString() {
    const now = new Date();
    return now.getFullYear() + "-" +
        String(now.getMonth()+1).padStart(2,"0") + "-" +
        String(now.getDate()).padStart(2,"0") + "_" +
        String(now.getHours()).padStart(2,"0") + "-" +
        String(now.getMinutes()).padStart(2,"0") + "-" +
        String(now.getSeconds()).padStart(2,"0");
}

function formatTime(date) {
    return date.getFullYear() + "/" +
        String(date.getMonth()+1).padStart(2,"0") + "/" +
        String(date.getDate()).padStart(2,"0") + " " +
        String(date.getHours()).padStart(2,"0") + ":" +
        String(date.getMinutes()).padStart(2,"0") + ":" +
        String(date.getSeconds()).padStart(2,"0");
}

function sendLog(text) {
    fetch(GAS_URL, {
        method: "POST",
        body: JSON.stringify({
            sheetName: sessionId,
            line: text
        })
    });
}

// CSV
fetch("words.csv")
.then(res => res.text())
.then(text => {
    let lines = text.split(/\r?\n/);

    words = lines.map(line => {
        const [id, word, meaning] = line.split(",");
        return {
            id: Number(id),
            word: word?.trim(),
            meaning: meaning?.trim()
        };
    }).filter(w => w.id && w.word && w.meaning);

    words.sort((a, b) => a.id - b.id);
    filteredWords = [...words];

    sendLog(formatTime(new Date()) + "（開始）");
    nextQuestion();
});

// 範囲
function applyRange() {
    const start = Number(document.getElementById("startId").value);
    const end = Number(document.getElementById("endId").value);

    filteredWords = words.filter(w => w.id >= start && w.id <= end);

    reviewQueue = [];
    correctMap = {};
    intervalMap = {};
    recentWords = [];
    correctCount = 0;
    totalCount = 0;

    sendLog("範囲指定," + start + "-" + end);

    nextQuestion();
}

// 出題
function getNextWord() {

    reviewQueue.forEach(q => q.delay--);

    let ready = reviewQueue.filter(q => q.delay <= 0);

    if (ready.length > 0) {
        const item = ready[0];
        reviewQueue = reviewQueue.filter(q => q !== item);
        return item.word;
    }

    let next;
    do {
        next = filteredWords[Math.floor(Math.random() * filteredWords.length)];
    } while (
        filteredWords.length > 3 &&
        recentWords.some(w => w.word === next.word)
    );

    return next;
}

// 出題表示
function nextQuestion() {

    if (filteredWords.length === 0) {
        document.getElementById("word").textContent = "🎉 全問卒業！";
        document.getElementById("choices").innerHTML = "";
        return;
    }

    document.getElementById("result").textContent = "";

    current = getNextWord();

    recentWords.push(current);
    if (recentWords.length > 3) recentWords.shift();

    document.getElementById("word").textContent = current.word;

    let choices = [current.meaning];
    while (choices.length < 4) {
        let rand = filteredWords[Math.floor(Math.random() * filteredWords.length)].meaning;
        if (!choices.includes(rand)) choices.push(rand);
    }

    choices.sort(() => Math.random() - 0.5);

    const div = document.getElementById("choices");
    div.innerHTML = "";

    choices.forEach(choice => {
        const btn = document.createElement("button");
        btn.textContent = choice;
        btn.onclick = () => checkAnswer(choice);
        div.appendChild(btn);
    });
}

// 判定（核心）
function checkAnswer(choice) {

    const now = new Date();
    totalCount++;

    let wordKey = current.word;

    if (choice === current.meaning) {

        correctCount++;
        document.getElementById("result").textContent = "⭕ 正解！";

        correctMap[wordKey] = (correctMap[wordKey] || 0) + 1;

        // ★ 間隔を倍にする
        let interval = intervalMap[wordKey] || 5;
        interval = interval * 2;
        intervalMap[wordKey] = interval;

        // ★ 3回正解で卒業
        if (correctMap[wordKey] >= 3) {
            filteredWords = filteredWords.filter(w => w.word !== wordKey);
        } else {
            reviewQueue.push({ word: current, delay: interval });
        }

    } else {

        document.getElementById("result").textContent =
            "❌ 不正解（正解：" + current.meaning + "）";

        // ★ リセットして5問後
        intervalMap[wordKey] = 5;
        correctMap[wordKey] = 0;

        reviewQueue.push({ word: current, delay: 5 });
    }

    sendLog(formatTime(now) + "," + current.word + "," + (choice === current.meaning ? "○" : "×"));

    setTimeout(nextQuestion, 1000);
}

// 終了
function finishTest() {
    const end = new Date();
    const accuracy = totalCount === 0 ? 0 : Math.round((correctCount / totalCount) * 100);

    sendLog("正解率," + accuracy + "%");
    sendLog(formatTime(end) + "（終了）");

    alert("ログ保存しました");
}
</script>

</body>
</html>
