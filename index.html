<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>単語暗記ツール（最終完成版）</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body { font-family: sans-serif; text-align: center; margin: 20px; }
button { margin: 6px; padding: 12px; font-size: 16px; width: 80%; max-width: 320px; }
#result { font-size: 18px; margin-top: 10px; height: 24px; }
.mode-btn { background: #eee; }
.active { background: #4CAF50; color: white; }
</style>
</head>
<body>

<h1 id="word">読み込み中...</h1>

<button class="mode-btn active" onclick="setMode('normal')" id="normalBtn">通常モード</button>
<button class="mode-btn" onclick="setMode('review')" id="reviewBtn">復習モード</button>
<button onclick="resetMistakes()">復習リセット</button>

<div id="choices"></div>
<p id="result"></p>

<br>
<button onclick="finishTest()">テスト終了（ログ保存）</button>

<script>
let words = [];
let mistakes = [];
let current = null;
let mode = "normal";

let correctCount = 0;
let totalCount = 0;

// GAS
const GAS_URL = "https://script.google.com/macros/s/AKfycbyiFLfbGL5UFrcQhYLn9E8cfQb1Rscl5q38Af1PWV6_W1TAHu9PN07GZOs4qX4tsxEODA/exec";

// セッション名（日本時間）
let sessionId = getJSTString();

function getJSTString() {
    const now = new Date();
    return now.getFullYear() + "-" +
        String(now.getMonth()+1).padStart(2,"0") + "-" +
        String(now.getDate()).padStart(2,"0") + "_" +
        String(now.getHours()).padStart(2,"0") + "-" +
        String(now.getMinutes()).padStart(2,"0") + "-" +
        String(now.getSeconds()).padStart(2,"0");
}

// 時刻
function formatTime(date) {
    return date.getFullYear() + "/" +
        String(date.getMonth()+1).padStart(2,"0") + "/" +
        String(date.getDate()).padStart(2,"0") + " " +
        String(date.getHours()).padStart(2,"0") + ":" +
        String(date.getMinutes()).padStart(2,"0") + ":" +
        String(date.getSeconds()).padStart(2,"0");
}

// ログ送信
function sendLog(text) {
    fetch(GAS_URL, {
        method: "POST",
        body: JSON.stringify({
            sheetName: sessionId,
            line: text
        })
    });
}

// ★ CSV読み込み（番号付き）
fetch("words.csv")
.then(res => res.text())
.then(text => {
    let lines = text.split(/\r?\n/);

    words = lines.map(line => {
        const [id, word, meaning] = line.split(",");
        return {
            id: Number(id),
            word: word?.trim(),
            meaning: meaning?.trim()
        };
    }).filter(w => w.id && w.word && w.meaning);

    // ID順
    words.sort((a, b) => a.id - b.id);

    correctCount = 0;
    totalCount = 0;
    mistakes = [];

    sendLog(formatTime(new Date()) + "（開始）");
    sendLog("INPUT：words.csv");

    nextQuestion();
});

// モード
function setMode(m) {
    mode = m;
    document.getElementById("normalBtn").classList.remove("active");
    document.getElementById("reviewBtn").classList.remove("active");

    if (m === "normal") {
        document.getElementById("normalBtn").classList.add("active");
    } else {
        document.getElementById("reviewBtn").classList.add("active");
    }

    nextQuestion();
}

// ★ 出題ロジック（核心）
function getNextWord(source) {

    // ① 復習モードはミス優先
    if (mode === "review" && mistakes.length > 0) {
        return mistakes[Math.floor(Math.random() * mistakes.length)];
    }

    // ② 通常モードでもミスを優先（確率高め）
    if (mistakes.length > 0 && Math.random() < 0.5) {
        return mistakes[Math.floor(Math.random() * mistakes.length)];
    }

    // ③ 若い番号優先＋ランダム
    const max = Math.min(10, source.length);
    const subset = source.slice(0, max);

    return subset[Math.floor(Math.random() * subset.length)];
}

// 出題
function nextQuestion() {
    document.getElementById("result").textContent = "";

    let source = (mode === "review") ? mistakes : words;

    if (source.length < 4) {
        document.getElementById("word").textContent =
            mode === "review" ? "復習データが足りません" : "単語が足りません";
        document.getElementById("choices").innerHTML = "";
        return;
    }

    current = getNextWord(source);
    document.getElementById("word").textContent = current.word;

    let choices = [current.meaning];
    while (choices.length < 4) {
        let rand = words[Math.floor(Math.random() * words.length)].meaning;
        if (!choices.includes(rand)) choices.push(rand);
    }

    choices.sort(() => Math.random() - 0.5);

    const div = document.getElementById("choices");
    div.innerHTML = "";

    choices.forEach(choice => {
        const btn = document.createElement("button");
        btn.textContent = choice;
        btn.onclick = () => checkAnswer(choice);
        div.appendChild(btn);
    });
}

// 判定
function checkAnswer(choice) {
    const now = new Date();
    totalCount++;

    let result;

    if (choice === current.meaning) {
        result = "○";
        correctCount++;
        document.getElementById("result").textContent = "⭕ 正解！";
    } else {
        result = "×";
        document.getElementById("result").textContent =
            "❌ 不正解（正解：" + current.meaning + "）";

        if (!mistakes.some(w => w.word === current.word)) {
            mistakes.push(current);
        }
    }

    sendLog(formatTime(now) + "," + current.word + "," + result);

    setTimeout(nextQuestion, 1000);
}

// リセット
function resetMistakes() {
    mistakes = [];
    alert("復習データをリセットしました");
}

// 終了
function finishTest() {
    const end = new Date();
    const accuracy = totalCount === 0 ? 0 : Math.round((correctCount / totalCount) * 100);

    sendLog("累計正解," + correctCount + ",累計問題数," + totalCount);
    sendLog("正解率," + accuracy + "%");
    sendLog(formatTime(end) + "（終了）");

    alert("ログ保存しました");
}
</script>

</body>
</html>
