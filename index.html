<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>単語暗記ツール（完全版）</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body { font-family: sans-serif; text-align: center; margin: 20px; }
button { margin: 6px; padding: 12px; font-size: 16px; width: 80%; max-width: 320px; }
#result { font-size: 18px; margin-top: 10px; height: 24px; }
#summary { margin-top:20px; font-size:20px; font-weight:bold; }
#nextBtn { background: #ff9800; color: white; display: none; }
input, select { padding: 8px; margin: 5px; width: 120px; }

#progressBarWrap {
    width: 80%; max-width: 320px;
    height: 20px; background: #eee;
    margin: 10px auto; border-radius: 10px;
}
#progressBar {
    height: 100%; width: 0%;
    background: #4caf50;
    border-radius: 10px;
}
</style>
</head>

<body>

<h3>CSV選択</h3>
<select id="csvSelector"></select>

<h3>出題モード</h3>
<select id="mode">
<option value="1">単語 → 意味</option>
<option value="2">意味 → 単語</option>
<option value="3">混在（交互）</option>
</select>

<h2>設定</h2>

出題範囲：
<input type="number" id="startId" value="1" min="1"> ～ 
<input type="number" id="endId" min="1">

<br>

選択肢数：
<input type="number" id="choiceCount" value="4" min="2" max="10">

<br>
<button onclick="applyRange()">開始</button>

<div id="progressText"></div>
<div id="progressBarWrap"><div id="progressBar"></div></div>

<h1 id="word">CSVを選択してください</h1>
<div id="choices"></div>
<p id="result"></p>

<button id="unknownBtn" onclick="markUnknown()" style="background:#9e9e9e; color:white; display:none;">
    🤔 分からない
</button>
<button id="nextBtn" onclick="nextQuestion()">次へ</button>

<div id="summary"></div>

<br>
<button onclick="finishTest()">テスト終了（ログ保存）</button>
<button id="speechToggleBtn" onclick="toggleSpeech()">
    🔊 音声ON
</button>

<script>

// ===== テスト・復習切り替え：モード =====
let phase = 1; // 1=通常, 2=間違い復習
let wrongWords = []; // 間違えた単語リスト

// ===== 追加：モード =====
let MODE = 1;
let lastMode = null;
let currentQMode = 1;

// ===== 設定 =====
let CHOICE_COUNT = 4;
let maxId = 0;
let answered = false;
let speechEnabled = localStorage.getItem("speechEnabled") === "true";




// ▼ここに追加
window.addEventListener("load", () => {
    const btn = document.getElementById("speechToggleBtn");

    if (speechEnabled) {
        btn.textContent = "🔊 音声ON";
    } else {
        btn.textContent = "🔇 音声OFF";
    }
    

    // 既存の音声ボタン処理の下に追加
    const saved = localStorage.getItem("vocabSettings");

    if (saved) {
        const s = JSON.parse(saved);

        if (s.mode) document.getElementById("mode").value = s.mode;
        if (s.startId) startId.value = s.startId;
        if (s.endId) endId.value = s.endId;
        if (s.choiceCount) choiceCount.value = s.choiceCount;
    }
});

// ===== CSV =====
let currentCsvName = "";

// ===== データ =====
let words = [];
let rangeWords = [];
let unseenWords = [];
let current = null;

// ===== 学習 =====
let correctCount = 0;
let totalCount = 0;

// ===== 進捗 =====
let initialCount = 0;
let startTime = null;

// ===== 苦手 =====
let missCount = {};
let missOrder = {};
let missSeq = 0;

let savedMiss = localStorage.getItem("missCount");
if (savedMiss) missCount = JSON.parse(savedMiss);

const progressText = document.getElementById("progressText");
const progressBar = document.getElementById("progressBar");

const startId = document.getElementById("startId");
const endId = document.getElementById("endId");
const choiceCount = document.getElementById("choiceCount");
const csvSelector = document.getElementById("csvSelector");

const unknownBtn = document.getElementById("unknownBtn");
const nextBtn = document.getElementById("nextBtn");
const summary = document.getElementById("summary");
const result = document.getElementById("result");
const choices = document.getElementById("choices");

//イベント登録
csvSelector.addEventListener("change", saveSettings);
document.getElementById("mode").addEventListener("change", saveSettings);
startId.addEventListener("input", saveSettings);
endId.addEventListener("input", saveSettings);
choiceCount.addEventListener("input", saveSettings);




// ★ 音声リスト（iPhone対策）
let voices = [];

function loadVoices() {
    voices = speechSynthesis.getVoices();
}

// iOSは非同期で読み込まれる
speechSynthesis.onvoiceschanged = loadVoices;

// 初回ロード
loadVoices();


const word = document.getElementById("word"); // ★これ無ければ追加

word.addEventListener("click", () => {
    if (!current) return;

    let text;

    if (currentQMode === 1) {
        // 単語 → 意味：英語を読む
        text = current.word;
    } else {
        // 意味 → 単語：日本語を読む
        text = current.meaning;
    }

    speak(text);
});

document.addEventListener("click", () => {
    // iPhone音声アンロック（確実版）
    const u = new SpeechSynthesisUtterance(" ");
    u.volume = 0;
    speechSynthesis.speak(u);
    speechSynthesis.cancel();
}, { once: true });

// ===== GAS =====
const GAS_URL = "https://script.google.com/macros/s/AKfycbz3P8tf46p-6LyMB4LMSyaiwe5dlfTNLdR06oNU3z9yrLzuKpD7SGa3YsvOz-m0pgECBQ/exec";
                 
// ===== セッション =====
function getJSTString() {
    const now = new Date();
    return now.getFullYear() + "-" +
        String(now.getMonth()+1).padStart(2,"0") + "-" +
        String(now.getDate()).padStart(2,"0") + "_" +
        String(now.getHours()).padStart(2,"0") + "-" +
        String(now.getMinutes()).padStart(2,"0") + "-" +
        String(now.getSeconds()).padStart(2,"0");
}
let sessionId = getJSTString();

// ===== 時刻 =====
function formatTime(date) {
    return date.getFullYear() + "/" +
        String(date.getMonth()+1).padStart(2,"0") + "/" +
        String(date.getDate()).padStart(2,"0") + " " +
        String(date.getHours()).padStart(2,"0") + ":" +
        String(date.getMinutes()).padStart(2,"0") + ":" +
        String(date.getSeconds()).padStart(2,"0");
}

// ===== GAS送信 =====
function sendLog(text) {
    console.log("送信:", text);

    fetch(GAS_URL, {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            sheetName: sessionId,
            line: text
        })
    })
    .then(res => res.text())
    .then(res => console.log("GAS応答:", res))
    .catch(err => console.error("エラー:", err));
}

// ===== CSV一覧 =====
fetch("csv-list.json")
.then(res => res.json())
.then(list => {
    list.forEach(file => {
        const opt = document.createElement("option");
        opt.value = file;
        opt.textContent = file;
        csvSelector.appendChild(opt);
    });

    // ★保存データ取得
    const saved = localStorage.getItem("vocabSettings");

    if (saved) {
        const s = JSON.parse(saved);

        currentCsvName = s.csv || list[0];
        csvSelector.value = currentCsvName;
    } else {
        currentCsvName = list[0];
    }

    loadCSV(currentCsvName);

    sendLog("INPUT：" + currentCsvName);
    sendLog(formatTime(new Date()) + "（開始）");
});

// ===== CSV切替 =====
csvSelector.addEventListener("change", () => {
    currentCsvName = csvSelector.value;
    loadCSV(currentCsvName);
    sendLog("INPUT切替：" + currentCsvName);
});

// ===== CSV読み込み =====
function loadCSV(fileName) {

    fetch(fileName)
    .then(res => res.text())
    .then(text => {

        let lines = text.split(/\r?\n/);
        lines.shift();

        words = lines.map(line => {
            let cols = line.includes("\t") ? line.split("\t") : line.split(",");
            return {
                id: Number(cols[0]),
                word: cols[1]?.trim(),
                meaning: cols[2]?.trim()
            };
        }).filter(w => w.id && w.word && w.meaning);

        words.sort((a,b)=>a.id-b.id);

        maxId = words.length > 0 ? words[words.length - 1].id : 0;

        startId.value = 1;
        endId.value = maxId;
        startId.max = maxId;
        endId.max = maxId;

        word.textContent = "「開始」を押してください";

        // =========================
        // ★ここに追加（最重要）
        // =========================
        const resumed = loadProgress();

        if (resumed) {
            if (confirm("前回の続きから再開しますか？")) {
                sendLog("途中再開");
                nextQuestion();
                return;
            } else {
                localStorage.removeItem("vocabProgress");
            }
        }
        // =========================

    });
}

// ===== モード取得 =====
function getMode() {
    if (MODE === 3) {
        lastMode = lastMode === 1 ? 2 : 1;
        return lastMode || 1;
    }
    return MODE;
}

// ===== バリデーション =====
function validateInputs(start, end, choiceCount) {
    if (isNaN(start) || isNaN(end)) return alert("範囲を正しく入力"), false;
    if (start < 1 || start > maxId) return alert("開始は1～" + maxId), false;
    if (end < 1 || end > maxId) return alert("終了は1～" + maxId), false;
    if (start > end) return alert("開始＞終了"), false;
    if (choiceCount < 2 || choiceCount > 10) return alert("選択肢は2～10"), false;
    let count = words.filter(w => w.id >= start && w.id <= end).length;
    if (count < choiceCount) return alert("単語数が選択肢数より少ない"), false;
    return true;
}

// ===== 開始 =====
function applyRange() {

	phase = 1;
	wrongWords = [];

    MODE = Number(document.getElementById("mode").value);
    lastMode = null;

    const start = Number(startId.value);
    const end = Number(endId.value);

    let c = Number(choiceCount.value);

    if (!validateInputs(start, end, c)) return;

    CHOICE_COUNT = Math.min(Math.max(c,2),10);

    rangeWords = words.filter(w => w.id >= start && w.id <= end);
	unseenWords = [...rangeWords];

	// ★ここに追加
	initialCount = rangeWords.length;
	startTime = new Date();
	
	correctCount = 0;
	totalCount = 0;

    missCount = {};
    missOrder = {};
    missSeq = 0;

    summary.innerHTML = "";
    result.textContent = "";

    sendLog("範囲指定," + start + "-" + end);

    updateProgress();
    nextQuestion();
}


//保存処理（変更時に保存）
function saveSettings() {
    const settings = {
        csv: csvSelector.value,
        mode: document.getElementById("mode").value,
        startId: startId.value,
        endId: endId.value,
        choiceCount: choiceCount.value
    };

    localStorage.setItem("vocabSettings", JSON.stringify(settings));
}

function saveProgress() {

    if (!currentCsvName || rangeWords.length === 0) return;

    const data = {
        csv: currentCsvName,
        startId: startId.value,
        endId: endId.value,
        mode: MODE,
        choiceCount: CHOICE_COUNT,
        phase: phase,
        unseenIds: unseenWords.map(w => w.id),
        wrongIds: wrongWords.map(w => w.id),
        correctCount: correctCount,
        totalCount: totalCount
    };

    localStorage.setItem("vocabProgress", JSON.stringify(data));
}


function loadProgress() {

    const saved = localStorage.getItem("vocabProgress");
    if (!saved) return false;

    const data = JSON.parse(saved);

    // CSV違うなら無視
    if (data.csv !== currentCsvName) return false;

    // 設定復元
    startId.value = data.startId;
    endId.value = data.endId;
    MODE = Number(data.mode);
    CHOICE_COUNT = Number(data.choiceCount);
    phase = data.phase;

    correctCount = data.correctCount;
    totalCount = data.totalCount;

    // 範囲再構築
    rangeWords = words.filter(w => 
        w.id >= data.startId && w.id <= data.endId
    );

    // ID→オブジェクト復元
    unseenWords = rangeWords.filter(w => data.unseenIds.includes(w.id));
    wrongWords = rangeWords.filter(w => data.wrongIds.includes(w.id));

    initialCount = rangeWords.length;
    startTime = new Date(); // ※ここは再計算でOK

    return true;
}


// ===== 進捗 =====
function updateProgress() {
    if (initialCount === 0) return;

	const remain = unseenWords.length + wrongWords.length + (current ? 1 : 0);
	const done = initialCount - unseenWords.length;
	
    const percent = Math.round(done / initialCount * 100);

    let remainTime = "--";
    if (done > 0) {
        const elapsed = (new Date() - startTime)/1000;
        const per = elapsed / done;
        const sec = per * remain;
        remainTime = Math.floor(sec/60)+"分"+Math.floor(sec%60)+"秒";
    }

	progressText.innerHTML =
	    `進捗：${done}/${initialCount}（${percent}%） 残り${remain}問 / ${remainTime} ` +
	    (phase === 1 ? "【通常】" : "【復習】");

    progressBar.style.width = percent + "%";
}

// ===== 選択肢 =====
function generateChoices(qMode) {
    let pool = (qMode === 1)
        ? rangeWords.map(w => w.meaning)
        : rangeWords.map(w => w.word);

    let correct = (qMode === 1)
        ? current.meaning
        : current.word;

    let choices = [correct];

    let others = pool.filter(x => x !== correct)
                     .sort(()=>Math.random()-0.5);

    choices = choices.concat(others.slice(0, CHOICE_COUNT - 1));

    return choices.sort(()=>Math.random()-0.5);
}

// ===== 出題 =====
function getNextWord() {

    // フェーズ1：通常
    if (phase === 1) {

        if (unseenWords.length > 0) {
            return unseenWords[Math.floor(Math.random() * unseenWords.length)];
        }

        // 全問終了 → フェーズ2へ
        if (unseenWords.length === 0) {
            if (wrongWords.length === 0) {
                return null; // 完全クリア
            } else {
                phase = 2;

                sendLog(formatTime(new Date()) + " 復習フェーズ開始（" + wrongWords.length + "問）");

                return getNextWord();
            }
        }
    }

	// フェーズ2：間違い復習（修正版）
	if (phase === 2) {

	    // まだミスが残っている限りループ
	    if (wrongWords.length > 0) {

	        // まだ正解していないものから出す
	        //return wrongWords.shift();
	        return wrongWords[Math.floor(Math.random() * wrongWords.length)];
	    }

	    // 全部正解したら終了
	    return null;
	}
}

// ===== 表示 =====
function nextQuestion() {
	answered = false;
	unknownBtn.style.display = "inline-block";
    updateProgress();
    nextBtn.style.display = "none";

    saveProgress(); // ←これ追加

    // ★追加：結果メッセージをクリア
    result.textContent = "";
    
    // ★④ モード取得（←これ必要）
	let qMode = getMode();
	currentQMode = qMode;

    // ★① 次の問題
    current = getNextWord();

    // ★② 終了判定
    if (!current) {
        word.textContent = "🎉 完全クリア！";
        result.textContent = "お疲れ様でした！";
        choices.innerHTML = "";
        unknownBtn.style.display = "none"; // ←追加
        
	    // ★ここ追加
	    sendLog("=== 完全クリア時点の状態 ===");
	    sendLog("問題数:" + totalCount);
	    sendLog("正解数:" + correctCount);
	    sendLog("正解率:" + (totalCount === 0 ? 0 : Math.round(correctCount / totalCount * 100)) + "%");
	    sendLog("残り単語数:" + unseenWords.length);
	    sendLog("ミス単語数:" + wrongWords.length);        
        sendLog("完了時刻:" + formatTime(new Date()));
        finishTest();
        return;
    }

    // ★③ 通常処理
    if (phase === 1) {
        unseenWords = unseenWords.filter(w => w.id !== current.id);
    }

    // ★⑤ 表示テキスト生成（←これ必要）
    let displayText = (qMode === 1) ? current.word : current.meaning;

    // ★⑥ 復習フェーズならラベル追加
    if (phase === 2) {
        displayText = "【復習】" + displayText;
    }

    // ★⑦ 表示
    word.textContent = displayText;

    // ★⑧ 選択肢生成
    let choicesArr = generateChoices(qMode);

    choices.innerHTML = "";

    choicesArr.forEach(c => {
        const btn = document.createElement("button");
        btn.textContent = c;
        btn.onclick = () => checkAnswer(c, qMode);
        choices.appendChild(btn);
    });
}
// ===== 判定 =====
function checkAnswer(choice, qMode) {

    if (answered) return; // ←これ
    answered = true;      // ←これ
    
    const now = new Date();
    totalCount++;
    let id = current.id;

    let correctAnswer = (qMode === 1)
        ? current.meaning
        : current.word;

    let isCorrect = (choice === correctAnswer);

    // 正解
    if (isCorrect) {
    	unknownBtn.style.display = "none";

        correctCount++;
        result.textContent = "⭕ 正解！";

	    // ★追加：復習リストから削除
	    wrongWords = wrongWords.filter(w => w.id !== current.id);

        setTimeout(nextQuestion, 800);

    // 不正解
    } else {

	    handleWrong(qMode); // ←置き換え
    }

    sendLog(formatTime(now) + "," + current.word + "," + (isCorrect ? "○" : "×"));
}

function handleWrong(qMode) {
    const now = new Date();
    let id = current.id;

    let correctAnswer = (qMode === 1)
        ? current.meaning
        : current.word;

    result.textContent = "❌ 不正解（正解：" + correctAnswer + "）";
    // ★追加：分からないボタンを非表示
	unknownBtn.style.display = "none";

    missCount[id] = (missCount[id] || 0) + 1;
    missSeq++;
    missOrder[id] = missSeq;

	if (!wrongWords.find(w => w.id === current.id)) {
	    wrongWords.push(current);
	}

    nextBtn.style.display = "inline-block";

}

function markUnknown() {

    if (answered) return; // ←追加
    answered = true;      // ←追加
    const now = new Date();

    // ★追加：ボタン非表示
    unknownBtn.style.display = "none";
    
    totalCount++;
    handleWrong(currentQMode);

    sendLog(formatTime(now) + "," + current.word + ",×（不明）");
}

function speak(text) {
    if (!text) return;

    // ★追加：OFFなら何もしない
    if (!speechEnabled) return;

    speechSynthesis.cancel();

    const utter = new SpeechSynthesisUtterance(text);
    const isJapanese = /[ぁ-んァ-ン一-龯]/.test(text);

    let v = null;
    const list = voices.length > 0 ? voices : speechSynthesis.getVoices();

    if (isJapanese) {
        // ★ 日本語voiceを選ぶ
        v = list.find(v => v.lang === "ja-JP");
        utter.lang = "ja-JP";
    } else {
        // ★ 英語voiceを選ぶ
        v = list.find(v => v.lang === "en-US") ||
            list.find(v => v.lang.startsWith("en"));
        utter.lang = "en-US";
    }

    if (v) utter.voice = v;

    utter.rate = 0.9;
    utter.pitch = 1.0;

    setTimeout(() => {
        speechSynthesis.speak(utter);

        setTimeout(() => {
            if (!speechSynthesis.speaking) {
                speechSynthesis.speak(utter);
            }
        }, 200);

    }, 50);
}

// ===== ランキング =====
function getMissRanking() {
    let arr = Object.keys(missCount).map(id => {
        let wordObj = words.find(w => w.id == id);
        if (!wordObj) return null;
        return {
            word: wordObj.word,
            count: missCount[id],
            order: missOrder[id] || 0
        };
    }).filter(x => x !== null); // ★ここに入れる

    arr.sort((a, b) => {
        if (b.count !== a.count) return b.count - a.count;
        return b.order - a.order;
    });

    return arr.slice(0, 5);
}

function toggleSpeech() {
    speechEnabled = !speechEnabled;

    localStorage.setItem("speechEnabled", speechEnabled);

    const btn = document.getElementById("speechToggleBtn");

    if (speechEnabled) {
        btn.textContent = "🔊 音声ON";
    } else {
        btn.textContent = "🔇 音声OFF";
        speechSynthesis.cancel();
    }
}


// ===== 終了 =====
function finishTest() {

    const end = new Date();
    const accuracy = totalCount === 0 ? 0 : Math.round((correctCount / totalCount) * 100);

    // ★追加（ここ）
    sendLog("=== 終了ボタン時点の状態 ===");
    sendLog("問題数:" + totalCount);
    sendLog("正解数:" + correctCount);
    sendLog("正解率:" + accuracy + "%");
    sendLog("残り:" + unseenWords.length);
    sendLog("ミス数:" + wrongWords.length);
    
    localStorage.setItem("missCount", JSON.stringify(missCount));
    localStorage.removeItem("vocabProgress"); // ←これ追加

    let ranking = getMissRanking();

    let html = "📊 成績<br>" +
        "正解数：" + correctCount + "<br>" +
        "問題数：" + totalCount + "<br>" +
        "正解率：" + accuracy + "%<br><br>";

    html += "📚 苦手ランキング<br>";

    if (ranking.length === 0) {
        html += "ミスなし！";
    } else {
        ranking.forEach((r, i) => {
            html += (i+1) + "位：" + r.word + "（" + r.count + "回）<br>";
        });
    }

    summary.innerHTML = html;

    sendLog(formatTime(end) + "（終了）");
    sendLog("正解率," + accuracy + "%");
}
</script>

</body>
</html>
