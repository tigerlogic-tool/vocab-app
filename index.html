<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>英単語学習アプリ</title>

<style>
body {
  font-family: sans-serif;
  max-width: 700px;
  margin: auto;
  padding: 10px;
}

h2 { text-align: center; }

#word {
  font-size: 34px;
  margin: 20px 0;
  text-align: center;
}

input {
  width: 100%;
  font-size: 18px;
  padding: 10px;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  font-size: 16px;
}

#stats {
  margin-top: 20px;
  font-size: 14px;
  background: #f5f5f5;
  padding: 10px;
  border-radius: 8px;
  white-space: pre-line;
}
</style>
</head>

<body>

<h2>英単語学習アプリ</h2>

<div id="word">読み込み中...</div>

<input id="answer" placeholder="意味を入力">
<button onclick="checkAnswer()">回答</button>

<div id="stats"></div>

<script>

// =====================
// GAS URL
// =====================
const GAS_URL = "https://script.google.com/macros/s/AKfycbxZmW9H5i0zp7EGbEaLlm44v7ZhW-AEHSlIFz8bxMpw29RjnSVl6eTwueYMMV2Ed83-ng/exec";

// =====================
// 状態
// =====================
let words = [];
let current = null;
let studyLogs = [];

let startTime = new Date();

let stats = {
  totalAnswered: 0,
  correctAnswered: 0,
  wrongAnswered: 0
};

// =====================
// CSV読み込み
// =====================
fetch("words.csv")
.then(r => r.text())
.then(text => {

  words = text.trim().split("\n").map(line => {
    const [word, meaning] = line.split(",");
    return {
      word: word.trim(),
      meaning: meaning.trim(),
      correctCount: 0,
      failed: false,
      cleared: false
    };
  });

  nextWord();
  updateStats();
});

// =====================
// 次の単語
// =====================
function nextWord() {
  const pool = words.filter(w => !w.cleared);

  if (pool.length === 0) {
    document.getElementById("word").innerText = "全単語クリア！";
    return;
  }

  current = pool[Math.floor(Math.random() * pool.length)];
  document.getElementById("word").innerText = current.word;
}

// =====================
// 回答処理
// =====================
function checkAnswer() {

  const input = document.getElementById("answer").value.trim();
  if (!current) return;

  stats.totalAnswered++;

  if (input === current.meaning) {

    stats.correctAnswered++;

    if (current.failed) {
      current.correctCount = 0;
    }

    current.correctCount++;
    current.failed = false;

    studyLogs.push({
      time: new Date().toLocaleString(),
      word: current.word,
      result: "○"
    });

    // 5回正解で消去
    if (current.correctCount >= 5) {
      current.cleared = true;
    }

  } else {

    stats.wrongAnswered++;
    current.failed = true;
    current.correctCount = 0;

    studyLogs.push({
      time: new Date().toLocaleString(),
      word: current.word,
      result: "×"
    });
  }

  document.getElementById("answer").value = "";

  updateStats();
  nextWord();
}

// =====================
// 統計表示
// =====================
function updateStats() {

  const total = words.length;
  const cleared = words.filter(w => w.cleared).length;
  const remaining = total - cleared;

  const accuracy = stats.totalAnswered === 0
    ? 0
    : (stats.correctAnswered / stats.totalAnswered * 100).toFixed(1);

  const rate = total === 0
    ? 0
    : (cleared / total * 100).toFixed(1);

  document.getElementById("stats").innerText =
`開始日時：${startTime.toLocaleString()}
実施単語数：${stats.totalAnswered}
正解数：${stats.correctAnswered}
不正解数：${stats.wrongAnswered}
正解率：${accuracy}%
完全消去数：${cleared}
未習得数：${remaining}
達成率：${rate}%`;
}

// =====================
// GAS送信
// =====================
function sendToGAS() {

  const total = words.length;
  const cleared = words.filter(w => w.cleared).length;
  const remaining = total - cleared;

  const accuracy = stats.totalAnswered === 0
    ? 0
    : (stats.correctAnswered / stats.totalAnswered * 100).toFixed(1);

  const rate = total === 0
    ? 0
    : (cleared / total * 100).toFixed(1);

  const payload = {
    startTime: startTime.toLocaleString(),
    endTime: new Date().toLocaleString(),

    totalAnswered: stats.totalAnswered,
    correct: stats.correctAnswered,
    wrong: stats.wrongAnswered,

    sessionAccuracy: accuracy,
    cleared: cleared,
    remaining: remaining,
    rate: rate,

    logs: studyLogs
  };

  fetch(GAS_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(payload),
    keepalive: true
  });
}

// =====================
// 終了時自動送信
// =====================
window.addEventListener("beforeunload", sendToGAS);

</script>

</body>
</html>
