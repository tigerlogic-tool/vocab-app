<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>単語暗記ツール（忘却曲線対応版）</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body { font-family: sans-serif; text-align: center; margin: 20px; }
button { margin: 6px; padding: 12px; font-size: 16px; width: 80%; max-width: 320px; }
#result { font-size: 18px; margin-top: 10px; height: 24px; }
.mode-btn { background: #eee; }
.active { background: #4CAF50; color: white; }
input { padding: 8px; margin: 5px; width: 100px; }
</style>
</head>
<body>

<h2>出題範囲</h2>
<input type="number" id="startId" value="1"> ～ 
<input type="number" id="endId" value="50">
<br>
<button onclick="applyRange()">範囲を適用</button>

<h1 id="word">読み込み中...</h1>

<div id="choices"></div>
<p id="result"></p>

<br>
<button onclick="finishTest()">テスト終了（ログ保存）</button>

<script>
let words = [];
let filteredWords = [];
let current = null;

// 忘却曲線キュー
let reviewQueue = [];

let correctCount = 0;
let totalCount = 0;

const GAS_URL = "https://script.google.com/macros/s/AKfycbyN6uzDSwGi71-yeY38Mm3HzwA7Y2DsnbDkcE27tiWskXZaO5P1vR7QbpkeqsWgzIuquQ/exec";

let sessionId = getJSTString();

function getJSTString() {
    const now = new Date();
    return now.getFullYear() + "-" +
        String(now.getMonth()+1).padStart(2,"0") + "-" +
        String(now.getDate()).padStart(2,"0") + "_" +
        String(now.getHours()).padStart(2,"0") + "-" +
        String(now.getMinutes()).padStart(2,"0") + "-" +
        String(now.getSeconds()).padStart(2,"0");
}

function formatTime(date) {
    return date.getFullYear() + "/" +
        String(date.getMonth()+1).padStart(2,"0") + "/" +
        String(date.getDate()).padStart(2,"0") + " " +
        String(date.getHours()).padStart(2,"0") + ":" +
        String(date.getMinutes()).padStart(2,"0") + ":" +
        String(date.getSeconds()).padStart(2,"0");
}

function sendLog(text) {
    fetch(GAS_URL, {
        method: "POST",
        body: JSON.stringify({
            sheetName: sessionId,
            line: text
        })
    });
}

// CSV読み込み
fetch("words.csv")
.then(res => res.text())
.then(text => {
    let lines = text.split(/\r?\n/);

    words = lines.map(line => {
        const [id, word, meaning] = line.split(",");
        return {
            id: Number(id),
            word: word?.trim(),
            meaning: meaning?.trim()
        };
    }).filter(w => w.id && w.word && w.meaning);

    words.sort((a, b) => a.id - b.id);
    filteredWords = [...words];

    sendLog(formatTime(new Date()) + "（開始）");
    sendLog("INPUT：words.csv");

    nextQuestion();
});

// 範囲
function applyRange() {
    const start = Number(document.getElementById("startId").value);
    const end = Number(document.getElementById("endId").value);

    filteredWords = words.filter(w => w.id >= start && w.id <= end);

    if (filteredWords.length < 4) {
        alert("単語が少なすぎます");
        return;
    }

    correctCount = 0;
    totalCount = 0;
    reviewQueue = [];

    sendLog("範囲指定," + start + "-" + end);

    nextQuestion();
}

// ★ 忘却曲線ロジック
function getNextWord() {

    // カウントダウン
    reviewQueue.forEach(q => q.delay--);

    // 出題可能な復習
    let ready = reviewQueue.filter(q => q.delay <= 0);

    if (ready.length > 0) {
        const item = ready[0];
        reviewQueue = reviewQueue.filter(q => q !== item);
        return item.word;
    }

    // 通常ランダム
    return filteredWords[Math.floor(Math.random() * filteredWords.length)];
}

// 出題
function nextQuestion() {
    document.getElementById("result").textContent = "";

    if (filteredWords.length < 4) {
        document.getElementById("word").textContent = "単語不足";
        return;
    }

    current = getNextWord();
    document.getElementById("word").textContent = current.word;

    let choices = [current.meaning];
    while (choices.length < 4) {
        let rand = filteredWords[Math.floor(Math.random() * filteredWords.length)].meaning;
        if (!choices.includes(rand)) choices.push(rand);
    }

    choices.sort(() => Math.random() - 0.5);

    const div = document.getElementById("choices");
    div.innerHTML = "";

    choices.forEach(choice => {
        const btn = document.createElement("button");
        btn.textContent = choice;
        btn.onclick = () => checkAnswer(choice);
        div.appendChild(btn);
    });
}

// 判定
function checkAnswer(choice) {
    const now = new Date();
    totalCount++;

    if (choice === current.meaning) {
        correctCount++;
        document.getElementById("result").textContent = "⭕ 正解！";
    } else {
        document.getElementById("result").textContent =
            "❌ 不正解（正解：" + current.meaning + "）";

        // ★ 忘却曲線登録
        reviewQueue.push({ word: current, delay: 2 });
        reviewQueue.push({ word: current, delay: 5 });
        reviewQueue.push({ word: current, delay: 10 });
    }

    sendLog(formatTime(now) + "," + current.word + "," + (choice === current.meaning ? "○" : "×"));

    setTimeout(nextQuestion, 1000);
}

// 終了
function finishTest() {
    const end = new Date();
    const accuracy = totalCount === 0 ? 0 : Math.round((correctCount / totalCount) * 100);

    sendLog("正解率," + accuracy + "%");
    sendLog(formatTime(end) + "（終了）");

    alert("ログ保存しました");
}
</script>

</body>
</html>
