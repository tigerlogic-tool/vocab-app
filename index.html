html id="final_complete_version"
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>単語暗記ツール（完全版＋バグ修正＋進捗）</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body { font-family: sans-serif; text-align: center; margin: 20px; }
button { margin: 6px; padding: 12px; font-size: 16px; width: 80%; max-width: 320px; }
#result { font-size: 18px; margin-top: 10px; height: 24px; }
#summary { margin-top:20px; font-size:20px; font-weight:bold; }
#nextBtn { background: #ff9800; color: white; display: none; }
input { padding: 8px; margin: 5px; width: 100px; }

/* 進捗 */
#progressArea { margin: 15px 0; }
#progressBarWrap {
    width: 80%; max-width: 320px;
    height: 20px; background: #eee;
    margin: 0 auto; border-radius: 10px;
}
#progressBar {
    height: 100%; width: 0%;
    background: #4caf50;
    border-radius: 10px;
}
</style>
</head>

<body>

<h2>出題範囲</h2>
<input type="number" id="startId" value="1"> ～ 
<input type="number" id="endId" value="50">
<br>
<button onclick="applyRange()">範囲を適用</button>

<div id="progressArea">
    <div id="progressText"></div>
    <div id="progressBarWrap">
        <div id="progressBar"></div>
    </div>
</div>

<h1 id="word">読み込み中...</h1>
<div id="choices"></div>
<p id="result"></p>

<button id="nextBtn" onclick="nextQuestion()">次へ</button>
<div id="summary"></div>

<br>
<button onclick="finishTest()">テスト終了（ログ保存）</button>

<script>
// ===== データ =====
let words = [];
let rangeWords = [];
let filteredWords = [];
let unseenWords = [];
let current = null;

// ===== 学習 =====
let reviewQueue = [];
let correctMap = {};
let intervalMap = {};

let correctCount = 0;
let totalCount = 0;

// ===== 進捗 =====
let initialCount = 0;
let startTime = null;

// ===== 苦手 =====
let missCount = {};
let missOrder = {};
let missSeq = 0;

let savedMiss = localStorage.getItem("missCount");
if (savedMiss) missCount = JSON.parse(savedMiss);

// ===== GAS =====
const GAS_URL = "https://script.google.com/macros/s/AKfycbyN6uzDSwGi71-yeY38Mm3HzwA7Y2DsnbDkcE27tiWskXZaO5P1vR7QbpkeqsWgzIuquQ/exec";

// ===== セッションID（復活）=====
function getJSTString() {
    const now = new Date();
    return now.getFullYear() + "-" +
        String(now.getMonth()+1).padStart(2,"0") + "-" +
        String(now.getDate()).padStart(2,"0") + "_" +
        String(now.getHours()).padStart(2,"0") + "-" +
        String(now.getMinutes()).padStart(2,"0") + "-" +
        String(now.getSeconds()).padStart(2,"0");
}
let sessionId = getJSTString();

// ===== 時刻 =====
function formatTime(date) {
    return date.getFullYear() + "/" +
        String(date.getMonth()+1).padStart(2,"0") + "/" +
        String(date.getDate()).padStart(2,"0") + " " +
        String(date.getHours()).padStart(2,"0") + ":" +
        String(date.getMinutes()).padStart(2,"0") + ":" +
        String(date.getSeconds()).padStart(2,"0");
}

// ===== GAS送信（完全復元）=====
function sendLog(text) {
    const formData = new FormData();
    formData.append("sheetName", sessionId);
    formData.append("line", text);

    fetch(GAS_URL, {
        method: "POST",
        body: formData
    });
}

// ===== CSV =====
fetch("words.csv")
.then(res => res.text())
.then(text => {

    let lines = text.split(/\r?\n/);

    words = lines.map(line => {
        const [id, word, meaning] = line.split(",");
        return {
            id: Number(id),
            word: word?.trim(),
            meaning: meaning?.trim()
        };
    }).filter(w => w.id && w.word && w.meaning);

    words.sort((a,b)=>a.id-b.id);

    // ★ログ順序復元
    sendLog("INPUT：words.csv");
    sendLog(formatTime(new Date()) + "（開始）");

    applyRange();
});

// ===== 進捗 =====
function updateProgress() {

    const remain = filteredWords.length;
    const done = initialCount - remain;
    const percent = initialCount ? Math.round(done / initialCount * 100) : 0;

    let remainTime = "--";
    if (done > 0) {
        const elapsed = (new Date() - startTime)/1000;
        const per = elapsed / done;
        const sec = per * remain;
        remainTime = Math.floor(sec/60)+"分"+Math.floor(sec%60)+"秒";
    }

    progressText.innerHTML =
        `進捗：${done}/${initialCount}（${percent}%）<br>残り：${remain}問 / 予想残り時間：${remainTime}`;

    progressBar.style.width = percent + "%";
}

// ===== 範囲 =====
function applyRange() {

    const start = Number(startId.value);
    const end = Number(endId.value);

    rangeWords = words.filter(w => w.id >= start && w.id <= end);
    filteredWords = [...rangeWords];
    unseenWords = [...rangeWords];

    reviewQueue = [];
    correctMap = {};
    intervalMap = {};

    correctCount = 0;
    totalCount = 0;

    // ★苦手リセット復元
    missCount = {};
    missOrder = {};
    missSeq = 0;

    initialCount = filteredWords.length;
    startTime = new Date();

    summary.innerHTML = "";
    result.textContent = "";

    sendLog("範囲指定," + start + "-" + end);

    updateProgress();
    nextQuestion();
}

// ===== 選択肢（完全安全）=====
function generateChoices() {

    let pool = rangeWords.map(w => w.meaning);
    pool = [...new Set(pool)];

    let choices = [current.meaning];

    let others = pool.filter(m => m !== current.meaning)
                     .sort(()=>Math.random()-0.5);

    choices = choices.concat(others.slice(0, 3));

    return choices.sort(()=>Math.random()-0.5);
}

// ===== 出題 =====
function getNextWord() {

    if (unseenWords.length > 0) {
        return unseenWords[Math.floor(Math.random() * unseenWords.length)];
    }

    reviewQueue.forEach(q => q.delay--);

    let ready = reviewQueue.filter(q => q.delay <= 0);

    if (ready.length > 0) {
        const item = ready[0];
        reviewQueue = reviewQueue.filter(q => q.word.id !== item.word.id);
        return item.word;
    }

    return filteredWords[Math.floor(Math.random() * filteredWords.length)];
}

// ===== 表示 =====
function nextQuestion() {

    updateProgress();
    nextBtn.style.display = "none";

    if (filteredWords.length === 0) {
        word.textContent = "🎉 テスト完了！全問クリア！";
        choices.innerHTML = "";
        progressBar.style.width = "100%";
        finishTest();
        return;
    }

    result.textContent = "";

    current = getNextWord();
    unseenWords = unseenWords.filter(w => w.id !== current.id);

    word.textContent = current.word;

    let choicesArr = generateChoices();

    choices.innerHTML = "";
    choicesArr.forEach(c=>{
        const btn = document.createElement("button");
        btn.textContent = c;
        btn.onclick = ()=>checkAnswer(c);
        choices.appendChild(btn);
    });
}

// ===== 判定 =====
function checkAnswer(choice) {

    const now = new Date();
    totalCount++;
    let id = current.id;

    let isCorrect = (choice === current.meaning);

    if (isCorrect) {

        correctCount++;
        result.textContent = "⭕ 正解！";

        correctMap[id] = (correctMap[id] || 0) + 1;

        let interval = intervalMap[id] || 5;
        interval *= 2;
        intervalMap[id] = interval;

        if (correctMap[id] >= 3) {
            filteredWords = filteredWords.filter(w => w.id !== id);
            unseenWords = unseenWords.filter(w => w.id !== id);
        } else {
            reviewQueue.push({ word: current, delay: interval });
        }

        setTimeout(nextQuestion, 800);

    } else {

        result.textContent = "❌ 不正解（正解：" + current.meaning + "）";

        missCount[id] = (missCount[id] || 0) + 1;
        missSeq++;
        missOrder[id] = missSeq;

        correctMap[id] = 0;
        intervalMap[id] = 5;

        reviewQueue.push({ word: current, delay: 5 });

        nextBtn.style.display = "inline-block";
    }

    sendLog(formatTime(now) + "," + current.word + "," + (isCorrect ? "○" : "×"));
}

// ===== ランキング =====
function getMissRanking() {

    let arr = Object.keys(missCount).map(id => {
        let wordObj = words.find(w => w.id == id);
        return {
            word: wordObj.word,
            count: missCount[id],
            order: missOrder[id] || 0
        };
    });

    arr.sort((a, b) => {
        if (b.count !== a.count) return b.count - a.count;
        return b.order - a.order;
    });

    return arr.slice(0, 5);
}

// ===== 終了 =====
function finishTest() {

    const end = new Date();
    const accuracy = totalCount === 0 ? 0 : Math.round((correctCount / totalCount) * 100);

    localStorage.setItem("missCount", JSON.stringify(missCount));

    let ranking = getMissRanking();

    let html = "📊 成績<br>" +
        "正解数：" + correctCount + "<br>" +
        "問題数：" + totalCount + "<br>" +
        "正解率：" + accuracy + "%<br><br>";

    html += "📚 苦手ランキング<br>";

    if (ranking.length === 0) {
        html += "ミスなし！";
    } else {
        ranking.forEach((r, i) => {
            html += (i+1) + "位：" + r.word + "（" + r.count + "回）<br>";
        });
    }

    summary.innerHTML = html;

    sendLog(formatTime(end) + "（終了）");
    sendLog("正解率," + accuracy + "%");
}
</script>

</body>
</html>
