<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>単語暗記ツール（完全版）</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body { font-family: sans-serif; text-align: center; margin: 20px; }
button { margin: 6px; padding: 12px; font-size: 16px; width: 80%; max-width: 320px; }
#result { font-size: 18px; margin-top: 10px; height: 24px; }
#summary { margin-top:20px; font-size:20px; font-weight:bold; }
#nextBtn { background: #ff9800; color: white; display: none; }
input, select { padding: 8px; margin: 5px; width: 120px; }

#progressBarWrap {
    width: 80%; max-width: 320px;
    height: 20px; background: #eee;
    margin: 10px auto; border-radius: 10px;
}
#progressBar {
    height: 100%; width: 0%;
    background: #4caf50;
    border-radius: 10px;
}
</style>
</head>

<body>

<h3>CSV選択</h3>
<select id="csvSelector"></select>

<h3>出題モード</h3>
<select id="mode">
<option value="1">単語 → 意味</option>
<option value="2">意味 → 単語</option>
<option value="3">混在（交互）</option>
</select>

<h2>設定</h2>

出題範囲：
<input type="number" id="startId" value="1" min="1"> ～ 
<input type="number" id="endId" min="1">

<br>

選択肢数：
<input type="number" id="choiceCount" value="4" min="2" max="10">

<br>
<button onclick="applyRange()">開始</button>

<div id="progressText"></div>
<div id="progressBarWrap"><div id="progressBar"></div></div>

<h1 id="word">CSVを選択してください</h1>
<div id="choices"></div>
<p id="result"></p>

<button id="unknownBtn" onclick="markUnknown()" style="background:#9e9e9e; color:white;">
    🤔 分からない
</button>
<button id="nextBtn" onclick="nextQuestion()">次へ</button>

<div id="summary"></div>

<br>
<button onclick="finishTest()">テスト終了（ログ保存）</button>

<script>


// ===== テスト・復習切り替え：モード =====
let phase = 1; // 1=通常, 2=間違い復習
let wrongWords = []; // 間違えた単語リスト
let wrongQueue = []; // 復習用

// ===== 追加：モード =====
let MODE = 1;
let lastMode = null;
let currentQMode = 1;

// ===== 設定 =====
let CHOICE_COUNT = 4;
let maxId = 0;
let answered = false;

// ===== CSV =====
let currentCsvName = "";

// ===== データ =====
let words = [];
let rangeWords = [];
let unseenWords = [];
let current = null;

// ===== 学習 =====
let correctCount = 0;
let totalCount = 0;

// ===== 進捗 =====
let initialCount = 0;
let startTime = null;

// ===== 苦手 =====
let missCount = {};
let missOrder = {};
let missSeq = 0;

let savedMiss = localStorage.getItem("missCount");
if (savedMiss) missCount = JSON.parse(savedMiss);

const progressText = document.getElementById("progressText");
const progressBar = document.getElementById("progressBar");

const startId = document.getElementById("startId");
const endId = document.getElementById("endId");
const choiceCount = document.getElementById("choiceCount");

// ===== GAS =====
const GAS_URL = "https://script.google.com/macros/s/AKfycbyN6uzDSwGi71-yeY38Mm3HzwA7Y2DsnbDkcE27tiWskXZaO5P1vR7QbpkeqsWgzIuquQ/exec";

// ===== セッション =====
function getJSTString() {
    const now = new Date();
    return now.getFullYear() + "-" +
        String(now.getMonth()+1).padStart(2,"0") + "-" +
        String(now.getDate()).padStart(2,"0") + "_" +
        String(now.getHours()).padStart(2,"0") + "-" +
        String(now.getMinutes()).padStart(2,"0") + "-" +
        String(now.getSeconds()).padStart(2,"0");
}
let sessionId = getJSTString();

// ===== 時刻 =====
function formatTime(date) {
    return date.getFullYear() + "/" +
        String(date.getMonth()+1).padStart(2,"0") + "/" +
        String(date.getDate()).padStart(2,"0") + " " +
        String(date.getHours()).padStart(2,"0") + ":" +
        String(date.getMinutes()).padStart(2,"0") + ":" +
        String(date.getSeconds()).padStart(2,"0");
}

// ===== GAS送信 =====
function sendLog(text) {
    const formData = new FormData();
    formData.append("sheetName", sessionId);
    formData.append("line", text);
    fetch(GAS_URL, { method: "POST", body: formData }).catch(()=>{});
}

// ===== CSV一覧 =====
fetch("csv-list.json")
.then(res => res.json())
.then(list => {
    list.forEach(file => {
        const opt = document.createElement("option");
        opt.value = file;
        opt.textContent = file;
        csvSelector.appendChild(opt);
    });

    currentCsvName = list[0];
    loadCSV(currentCsvName);

    sendLog("INPUT：" + currentCsvName);
    sendLog(formatTime(new Date()) + "（開始）");
});

// ===== CSV切替 =====
csvSelector.addEventListener("change", () => {
    currentCsvName = csvSelector.value;
    loadCSV(currentCsvName);
    sendLog("INPUT切替：" + currentCsvName);
});

// ===== CSV読み込み =====
function loadCSV(fileName) {

    fetch(fileName)
    .then(res => res.text())
    .then(text => {

        let lines = text.split(/\r?\n/);
        lines.shift();

        words = lines.map(line => {
            let cols = line.includes("\t") ? line.split("\t") : line.split(",");
            return {
                id: Number(cols[0]),
                word: cols[1]?.trim(),
                meaning: cols[2]?.trim()
            };
        }).filter(w => w.id && w.word && w.meaning);

        words.sort((a,b)=>a.id-b.id);

        maxId = words.length > 0 ? words[words.length - 1].id : 0;

        startId.value = 1;
        endId.value = maxId;
        startId.max = maxId;
        endId.max = maxId;

        word.textContent = "「開始」を押してください";
    });
}

// ===== モード取得 =====
function getMode() {
    if (MODE === 3) {
        lastMode = lastMode === 1 ? 2 : 1;
        return lastMode || 1;
    }
    return MODE;
}

// ===== バリデーション =====
function validateInputs(start, end, choiceCount) {
    if (isNaN(start) || isNaN(end)) return alert("範囲を正しく入力"), false;
    if (start < 1 || start > maxId) return alert("開始は1～" + maxId), false;
    if (end < 1 || end > maxId) return alert("終了は1～" + maxId), false;
    if (start > end) return alert("開始＞終了"), false;
    if (choiceCount < 2 || choiceCount > 10) return alert("選択肢は2～10"), false;
    let count = words.filter(w => w.id >= start && w.id <= end).length;
    if (count < choiceCount) return alert("単語数が選択肢数より少ない"), false;
    return true;
}

// ===== 開始 =====
function applyRange() {

	phase = 1;
	wrongWords = [];
	wrongQueue = [];

    MODE = Number(document.getElementById("mode").value);
    lastMode = null;

    const start = Number(startId.value);
    const end = Number(endId.value);

    let c = Number(choiceCount.value);

    if (!validateInputs(start, end, c)) return;

    CHOICE_COUNT = Math.min(Math.max(c,2),10);

    rangeWords = words.filter(w => w.id >= start && w.id <= end);
	unseenWords = [...rangeWords];

	// ★ここに追加
	initialCount = rangeWords.length;
	startTime = new Date();
	
	correctCount = 0;
	totalCount = 0;

    missCount = {};
    missOrder = {};
    missSeq = 0;

    summary.innerHTML = "";
    result.textContent = "";

    sendLog("範囲指定," + start + "-" + end);

    updateProgress();
    nextQuestion();
}

// ===== 進捗 =====
function updateProgress() {
    if (initialCount === 0) return;

	const remain = unseenWords.length + wrongQueue.length + wrongWords.length;
	const done = initialCount - remain;
	
    const percent = Math.round(done / initialCount * 100);

    let remainTime = "--";
    if (done > 0) {
        const elapsed = (new Date() - startTime)/1000;
        const per = elapsed / done;
        const sec = per * remain;
        remainTime = Math.floor(sec/60)+"分"+Math.floor(sec%60)+"秒";
    }

	progressText.innerHTML =
	    `進捗：${done}/${initialCount}（${percent}%） 残り${remain}問 / ${remainTime} ` +
	    (phase === 1 ? "【通常】" : "【復習】");

    progressBar.style.width = percent + "%";
}

// ===== 選択肢 =====
function generateChoices(qMode) {
    let pool = (qMode === 1)
        ? rangeWords.map(w => w.meaning)
        : rangeWords.map(w => w.word);

    let correct = (qMode === 1)
        ? current.meaning
        : current.word;

    let choices = [correct];

    let others = pool.filter(x => x !== correct)
                     .sort(()=>Math.random()-0.5);

    choices = choices.concat(others.slice(0, CHOICE_COUNT - 1));

    return choices.sort(()=>Math.random()-0.5);
}

// ===== 出題 =====
function getNextWord() {

    // フェーズ1：通常
    if (phase === 1) {

        if (unseenWords.length > 0) {
            return unseenWords[Math.floor(Math.random() * unseenWords.length)];
        }

        // 全問終了 → フェーズ2へ
        if (unseenWords.length === 0) {
            if (wrongWords.length === 0) {
                return null; // 完全クリア
            } else {
                phase = 2;

                sendLog(formatTime(new Date()) + " 復習フェーズ開始（" + wrongWords.length + "問）");

                wrongQueue = [...wrongWords];
                wrongWords = [];
                return getNextWord();
            }
        }
    }

    // フェーズ2：間違い復習
    if (phase === 2) {

        if (wrongQueue.length > 0) {
            return wrongQueue.splice(Math.floor(Math.random()*wrongQueue.length),1)[0];
        }

        // 復習終了
        if (wrongWords.length === 0) {
            return null; // 完全クリア
        } else {
            // もう一周
            wrongQueue = [...wrongWords];
            wrongWords = [];
            return getNextWord();
        }
    }
}

// ===== 表示 =====
function nextQuestion() {
	answered = false;
	unknownBtn.style.display = "inline-block";
    updateProgress();
    nextBtn.style.display = "none";

    // ★④ モード取得（←これ必要）
	let qMode = getMode();
	currentQMode = qMode;

    // ★① 次の問題
    current = getNextWord();

    // ★② 終了判定
    if (!current) {
        word.textContent = "🎉 完全クリア！";
        result.textContent = "お疲れ様でした！";
        choices.innerHTML = "";
        unknownBtn.style.display = "none"; // ←追加
        finishTest();
        return;
    }

    // ★③ 通常処理
    if (phase === 1) {
        unseenWords = unseenWords.filter(w => w.id !== current.id);
    }

    // ★⑤ 表示テキスト生成（←これ必要）
    let displayText = (qMode === 1) ? current.word : current.meaning;

    // ★⑥ 復習フェーズならラベル追加
    if (phase === 2) {
        displayText = "【復習】" + displayText;
    }

    // ★⑦ 表示
    word.textContent = displayText;

    // ★⑧ 選択肢生成
    let choicesArr = generateChoices(qMode);

    choices.innerHTML = "";

    choicesArr.forEach(c => {
        const btn = document.createElement("button");
        btn.textContent = c;
        btn.onclick = () => checkAnswer(c, qMode);
        choices.appendChild(btn);
    });
}
// ===== 判定 =====
function checkAnswer(choice, qMode) {

    if (answered) return; // ←これ
    answered = true;      // ←これ
    
    const now = new Date();
    totalCount++;
    let id = current.id;

    let correctAnswer = (qMode === 1)
        ? current.meaning
        : current.word;

    let isCorrect = (choice === correctAnswer);

    // 正解
    if (isCorrect) {
    	unknownBtn.style.display = "none";

        correctCount++;
        result.textContent = "⭕ 正解！";

        setTimeout(nextQuestion, 800);

    // 不正解
    } else {

	    handleWrong(qMode); // ←置き換え
    }

    sendLog(formatTime(now) + "," + current.word + "," + (isCorrect ? "○" : "×"));
}

function handleWrong(qMode) {
    const now = new Date();
    let id = current.id;

    let correctAnswer = (qMode === 1)
        ? current.meaning
        : current.word;

    result.textContent = "❌ 不正解（正解：" + correctAnswer + "）";
    // ★追加：分からないボタンを非表示
	unknownBtn.style.display = "none";

    missCount[id] = (missCount[id] || 0) + 1;
    missSeq++;
    missOrder[id] = missSeq;

    if (!wrongWords.find(w => w.id === current.id)) {
        wrongWords.push(current);
    }

    nextBtn.style.display = "inline-block";

}

function markUnknown() {

    if (answered) return; // ←追加
    answered = true;      // ←追加
    const now = new Date();

    // ★追加：ボタン非表示
    unknownBtn.style.display = "none";
    
    totalCount++;
    handleWrong(currentQMode);

    sendLog(formatTime(now) + "," + current.word + ",×（不明）");
}

// ===== ランキング =====
function getMissRanking() {
    let arr = Object.keys(missCount).map(id => {
        let wordObj = words.find(w => w.id == id);
        if (!wordObj) return null;
        return {
            word: wordObj.word,
            count: missCount[id],
            order: missOrder[id] || 0
        };
    }).filter(x => x !== null); // ★ここに入れる

    arr.sort((a, b) => {
        if (b.count !== a.count) return b.count - a.count;
        return b.order - a.order;
    });

    return arr.slice(0, 5);
}

// ===== 終了 =====
function finishTest() {

    const end = new Date();
    const accuracy = totalCount === 0 ? 0 : Math.round((correctCount / totalCount) * 100);

    localStorage.setItem("missCount", JSON.stringify(missCount));

    let ranking = getMissRanking();

    let html = "📊 成績<br>" +
        "正解数：" + correctCount + "<br>" +
        "問題数：" + totalCount + "<br>" +
        "正解率：" + accuracy + "%<br><br>";

    html += "📚 苦手ランキング<br>";

    if (ranking.length === 0) {
        html += "ミスなし！";
    } else {
        ranking.forEach((r, i) => {
            html += (i+1) + "位：" + r.word + "（" + r.count + "回）<br>";
        });
    }

    summary.innerHTML = html;

    sendLog(formatTime(end) + "（終了）");
    sendLog("正解率," + accuracy + "%");
}
</script>

</body>
</html>
