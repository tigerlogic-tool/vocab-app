<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>単語暗記アプリ（4択）</title>
<style>
  body { font-family: sans-serif; padding: 20px; }
  #word { font-size: 32px; margin-bottom: 20px; }
  .choice { 
    display: block; 
    width: 100%; 
    padding: 12px; 
    margin: 8px 0; 
    font-size: 20px; 
    cursor: pointer; 
  }
  #result { margin-top: 20px; font-size: 22px; }
  #nextBtn { margin-top: 20px; padding: 10px 20px; font-size: 20px; display:none; }
</style>
</head>
<body>

<h1>単語暗記アプリ（4択）</h1>

<div id="word">読み込み中...</div>

<div id="choices"></div>

<div id="result"></div>

<button id="nextBtn" onclick="nextQuestion()">次の問題へ</button>

<script>
// ===============================
// 設定
// ===============================
// GAS
const GAS_URL = "https://script.google.com/macros/s/AKfycbwArre7U_Xmp4pwivGEPX3oAQB7CqYtA5QBNBOrbLr2qoVYML2n0lzcEwadc5U8nUnmwQ/exec";


let wordList = [];   // {word, meaning}
let master = [];     // GASから取得
let current = null;  // 現在の出題単語

// ===============================
// words.csv を読み込み、単語＋意味を取得
// ===============================
fetch("words.csv")
  .then(res => res.text())
  .then(text => {
      wordList = text
        .split("\n")
        .map(r => r.split(","))
        .filter(row => row.length >= 3)
        .map(row => ({
          word: row[1].trim(),
          meaning: row[2].trim()
        }));

      loadMaster();
  });

// ===============================
// Master を取得
// ===============================
async function loadMaster() {
  const res = await fetch(GAS_URL + "?type=getMaster");
  master = await res.json();
  nextQuestion();
}

// ===============================
// 出題ロジック（Master の再出題対象？＝○）
// ===============================
function nextQuestion() {
  document.getElementById("result").innerText = "";
  document.getElementById("nextBtn").style.display = "none";

  const candidates = master.filter(m => m.retest === "○");

  if (candidates.length === 0) {
    document.getElementById("word").innerText = "出題対象の単語がありません";
    document.getElementById("choices").innerHTML = "";
    return;
  }

  const pick = candidates[Math.floor(Math.random() * candidates.length)];
  current = wordList.find(w => w.word === pick.word);

  document.getElementById("word").innerText = current.word;

  createChoices(current);
}

// ===============================
// 4択生成
// ===============================
function createChoices(target) {
  const choicesDiv = document.getElementById("choices");
  choicesDiv.innerHTML = "";

  const wrong = wordList
    .filter(w => w.word !== target.word)
    .map(w => w.meaning);

  shuffle(wrong);

  const options = [target.meaning, ...wrong.slice(0, 3)];
  shuffle(options);

  options.forEach(opt => {
    const btn = document.createElement("button");
    btn.className = "choice";
    btn.innerText = opt;
    btn.onclick = () => checkAnswer(opt);
    choicesDiv.appendChild(btn);
  });
}

// ===============================
// 正誤判定
// ===============================
function checkAnswer(selected) {
  const isCorrect = (selected === current.meaning);

  document.getElementById("result").innerText =
    isCorrect
      ? `正解！ → ${current.meaning}`
      : `不正解… 正解は「${current.meaning}」`;

  sendResult(isCorrect);

  document.getElementById("nextBtn").style.display = "block";
}

// ===============================
// GAS へ結果送信
// ===============================
function sendResult(isCorrect) {
  const payload = {
    type: "updateMaster",
    word: current.word,
    deltaScore: isCorrect ? +1 : -2,
    lastCorrectDate: isCorrect ? formatDate(new Date()) : null
  };

  fetch(GAS_URL, {
    method: "POST",
    body: JSON.stringify(payload)
  }).then(() => loadMaster());
}

// ===============================
// ユーティリティ
// ===============================
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

function formatDate(d) {
  const y = d.getFullYear();
  const m = ("0" + (d.getMonth()+1)).slice(-2);
  const day = ("0" + d.getDate()).slice(-2);
  return `${y}/${m}/${day}`;
}
</script>

</body>
</html>
