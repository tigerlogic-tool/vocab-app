<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>単語暗記ツール（最終完成版）</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body { font-family: sans-serif; text-align: center; margin: 20px; }
button { margin: 6px; padding: 12px; font-size: 16px; width: 80%; max-width: 320px; }
#result { font-size: 18px; margin-top: 10px; height: 24px; }
#summary { margin-top:20px; font-size:20px; font-weight:bold; }
#nextBtn { background: #ff9800; color: white; display: none; }
input { padding: 8px; margin: 5px; width: 100px; }
</style>
</head>
<body>

<h2>出題範囲</h2>
<input type="number" id="startId" value="1"> ～ 
<input type="number" id="endId" value="50">
<br>
<button onclick="applyRange()">範囲を適用</button>

<h1 id="word">読み込み中...</h1>

<div id="choices"></div>
<p id="result"></p>

<button id="nextBtn" onclick="nextQuestion()">次へ</button>

<div id="summary"></div>

<br>
<button onclick="finishTest()">テスト終了（ログ保存）</button>

<script>
let words = [];
let filteredWords = [];
let unseenWords = [];
let current = null;

let reviewQueue = [];
let correctMap = {};
let intervalMap = {};

let correctCount = 0;
let totalCount = 0;

// ★ 苦手ランキング
let missCount = {};
let missOrder = {};
let missSeq = 0;

// localStorage復元
let savedMiss = localStorage.getItem("missCount");
if (savedMiss) {
    missCount = JSON.parse(savedMiss);
}

// GAS
const GAS_URL = "https://script.google.com/macros/s/AKfycbyN6uzDSwGi71-yeY38Mm3HzwA7Y2DsnbDkcE27tiWskXZaO5P1vR7QbpkeqsWgzIuquQ/exec";

// セッションID
let sessionId = new Date().getTime();

// ログ送信（form方式）
function sendLog(text) {
    const formData = new FormData();
    formData.append("sheetName", sessionId);
    formData.append("line", text);

    fetch(GAS_URL, {
        method: "POST",
        body: formData
    });
}

// CSV読み込み
fetch("words.csv")
.then(res => res.text())
.then(text => {
    let lines = text.split(/\r?\n/);

    words = lines.map(line => {
        const [id, word, meaning] = line.split(",");
        return {
            id: Number(id),
            word: word?.trim(),
            meaning: meaning?.trim()
        };
    }).filter(w => w.id && w.word && w.meaning);

    words.sort((a,b)=>a.id-b.id);

    filteredWords = [...words];
    unseenWords = [...words];

    sendLog("開始");
    nextQuestion();
});

// 範囲適用
function applyRange() {

    const start = Number(startId.value);
    const end = Number(endId.value);

    filteredWords = words.filter(w => w.id >= start && w.id <= end);
    unseenWords = [...filteredWords];

    reviewQueue = [];
    correctMap = {};
    intervalMap = {};

    correctCount = 0;
    totalCount = 0;

    // ★ リセット
    missCount = {};
    missOrder = {};
    missSeq = 0;

    summary.innerHTML = "";
    result.textContent = "";

    sendLog("範囲指定," + start + "-" + end);

    nextQuestion();
}

// 出題ロジック
function getNextWord() {

    if (unseenWords.length > 0) {
        return unseenWords[Math.floor(Math.random() * unseenWords.length)];
    }

    reviewQueue.forEach(q => q.delay--);

    let ready = reviewQueue.filter(q => q.delay <= 0);

    if (ready.length > 0) {
        const item = ready[0];
        reviewQueue = reviewQueue.filter(q => q.word.id !== item.word.id);
        return item.word;
    }

    return filteredWords[Math.floor(Math.random() * filteredWords.length)];
}

// 出題
function nextQuestion() {

    nextBtn.style.display = "none";

    if (filteredWords.length === 0) {
        word.textContent = "🎉 全問卒業！";
        choices.innerHTML = "";
        return;
    }

    result.textContent = "";

    current = getNextWord();

    unseenWords = unseenWords.filter(w => w.id !== current.id);

    word.textContent = current.word;

    let choicesArr = [current.meaning];
    while (choicesArr.length < 4) {
        let rand = filteredWords[Math.floor(Math.random() * filteredWords.length)].meaning;
        if (!choicesArr.includes(rand)) choicesArr.push(rand);
    }

    choicesArr.sort(()=>Math.random()-0.5);

    choices.innerHTML = "";
    choicesArr.forEach(c=>{
        const btn = document.createElement("button");
        btn.textContent = c;
        btn.onclick = ()=>checkAnswer(c);
        choices.appendChild(btn);
    });
}

// 判定
function checkAnswer(choice) {

    totalCount++;
    let id = current.id;

    let isCorrect = (choice === current.meaning);

    if (isCorrect) {

        correctCount++;
        result.textContent = "⭕ 正解！";

        correctMap[id] = (correctMap[id] || 0) + 1;

        let interval = intervalMap[id] || 5;
        interval *= 2;
        intervalMap[id] = interval;

        if (correctMap[id] >= 3) {
            filteredWords = filteredWords.filter(w => w.id !== id);
            unseenWords = unseenWords.filter(w => w.id !== id);
        } else {
            reviewQueue.push({ word: current, delay: interval });
        }

        setTimeout(nextQuestion, 800);

    } else {

        result.textContent = "❌ 不正解（正解：" + current.meaning + "）";

        // ★ ミス記録
        missCount[id] = (missCount[id] || 0) + 1;
        missSeq++;
        missOrder[id] = missSeq;

        correctMap[id] = 0;
        intervalMap[id] = 5;

        reviewQueue.push({ word: current, delay: 5 });

        nextBtn.style.display = "inline-block";
    }

    sendLog(current.word + "," + (isCorrect ? "○" : "×"));
}

// ランキング
function getMissRanking() {

    let arr = Object.keys(missCount).map(id => {
        let wordObj = words.find(w => w.id == id);
        return {
            word: wordObj.word,
            count: missCount[id],
            order: missOrder[id] || 0
        };
    });

    arr.sort((a, b) => {
        if (b.count !== a.count) return b.count - a.count;
        return b.order - a.order;
    });

    return arr.slice(0, 5);
}

// 終了
function finishTest() {

    const accuracy = totalCount === 0 ? 0 : Math.round((correctCount / totalCount) * 100);

    localStorage.setItem("missCount", JSON.stringify(missCount));

    let ranking = getMissRanking();

    let html = "📊 成績<br>" +
        "正解数：" + correctCount + "<br>" +
        "問題数：" + totalCount + "<br>" +
        "正解率：" + accuracy + "%<br><br>";

    html += "📚 苦手ランキング<br>";

    if (ranking.length === 0) {
        html += "ミスなし！";
    } else {
        ranking.forEach((r, i) => {
            html += (i+1) + "位：" + r.word + "（" + r.count + "回）<br>";
        });
    }

    summary.innerHTML = html;

    sendLog("正解率," + accuracy + "%");
}
</script>

</body>
</html>
